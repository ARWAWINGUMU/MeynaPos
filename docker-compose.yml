services:
  db:
    image: postgres:16-alpine
    container_name: meynapos-db
    environment:
      POSTGRES_USER: meynapos
      POSTGRES_PASSWORD: meynapos
      POSTGRES_DB: meynapos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meynapos"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: meynapos-backend
    environment:
      DATABASE_URL: postgresql+psycopg://meynapos:meynapos@db:5432/meynapos
      SECRET_KEY: change-this-secret-in-production
      ENVIRONMENT: development
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api
        VITE_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
    container_name: meynapos-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
